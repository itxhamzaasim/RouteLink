services:
  - type: web
    name: routelink-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
        description: "The connection string to your MongoDB Atlas database cluster"
      - key: JWT_SECRET
        generateValue: true
        description: "Secure generated secret key for signing user sessions"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
        description: "The deployed Vercel frontend URL (e.g. https://routelink.vercel.app)"
